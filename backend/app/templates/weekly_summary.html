{% extends "base.html" %}
{% block content %}
<p>Hello {{ name }},</p>
<p>Here's your weekly accountability summary:</p>
<table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
    <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
        <td style="padding: 10px;">Study Hours</td>
        <td style="padding: 10px; text-align: right; color: #5ef3b3;">{{ study_hours }}h</td>
    </tr>
    <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
        <td style="padding: 10px;">Tasks Completed</td>
        <td style="padding: 10px; text-align: right; color: #5ef3b3;">{{ tasks_completed }}</td>
    </tr>
    <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
        <td style="padding: 10px;">Current Streak</td>
        <td style="padding: 10px; text-align: right; color: #5ef3b3;">{{ streak_days }} days</td>
    </tr>
    <tr>
        <td style="padding: 10px;">Accountability Score</td>
        <td style="padding: 10px; text-align: right; color: #5ef3b3;">{{ score }}%</td>
    </tr>
</table>
<p>Keep building momentum! 🚀</p>
{% endblock %}
