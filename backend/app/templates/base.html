<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070a12; color: #ffffff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #111827; padding: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #5ef3b3; margin: 0; }
        .content { font-size: 16px; line-height: 1.5; color: rgba(255,255,255,0.8); }
        .btn { display: inline-block; padding: 12px 24px; background-color: #5ef3b3; color: #070a12; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }
        .footer { margin-top: 30px; font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Momentum</h1>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            &copy; {{ year }} Momentum Platform. Stay consistent.
        </div>
    </div>
</body>
</html>
